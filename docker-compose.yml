services:
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-admin}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
            POSTGRES_DB: ${POSTGRES_DB:-articles}
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-articles}']
            interval: 5s
            timeout: 5s
            retries: 10

    app:
        build: .
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            # Overrides any DATABASE_URL from env_file — points at the compose postgres
            # service (host "postgres"), NOT 127.0.0.1.
            DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-articles}
            PORT: 3030
            NODE_ENV: production
        env_file:
            # Storage / AWS / asset config and secrets. Keep out of the image.
            - .env
        volumes:
            # Persist locally-stored uploads (only relevant when STORAGE_TYPE=local).
            # Files are written to /app/${FILES_STORE} inside the container.
            - ./${FILES_STORE:-files}:/app/${FILES_STORE:-files}
        ports:
            - '${APP_PORT:-3030}:3030'

volumes:
    pgdata:
